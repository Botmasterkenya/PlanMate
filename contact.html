<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | PlanMate</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Sticky Navbar -->
  <header class="main-header">
    <nav class="navbar">
      <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">PlanMate.</a></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="contact.html" class="active" style="color: var(--text-primary); border-bottom: 2px solid var(--accent-primary);">Contact</a></li>
        <li><a href="login.html" class="btn-primary">Login</a></li>
      </ul>
    </nav>
  </header>

  <main class="auth-wrapper" style="align-items: flex-start; padding-top: 150px;">
    <div class="auth-card glass animate-slide-up" style="max-width: 600px;">
      <h2>Get in Touch</h2>
      <p>Have questions, feedback, or need support? Reach out to us below.</p>

      <form id="contactForm" class="login-form" style="margin-top: 30px;">
        <div class="form-group">
          <label for="contactName">Your Name</label>
          <input type="text" id="contactName" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="contactEmail">Email Address</label>
          <input type="email" id="contactEmail" class="form-control" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
          <label for="contactMessage">Message</label>
          <textarea id="contactMessage" class="form-control" rows="5" placeholder="How can we help you?" style="resize: vertical;" required></textarea>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
