<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | PlanMate</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Floating Logo -->
  <a href="index.html" class="logo animate-fade-in" style="position: absolute; top: 30px; left: 40px; cursor: pointer;">
    PlanMate.
  </a>

  <main class="auth-wrapper">
    <div class="auth-card glass animate-slide-up">
      <h2>Join PlanMate</h2>
      <p>Create an account to start planning better events.</p>

      <form action="Dashboard.html" method="GET" class="register-form">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" class="form-control" placeholder="Your Name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control confirm-password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
