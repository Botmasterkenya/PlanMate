<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | PlanMate</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Floating Logo -->
  <a href="index.html" class="logo animate-fade-in" style="position: absolute; top: 30px; left: 40px; cursor: pointer;">
    PlanMate.
  </a>

  <!-- Auth Centered Layout -->
  <main class="auth-wrapper">
    <div class="auth-card glass animate-slide-up">
      <h2>Welcome Back</h2>
      <p>Log in to access your dashboard and manage your events.</p>

      <form action="Dashboard.html" method="GET" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one here</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
